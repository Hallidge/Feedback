// ===================================================
//  SCORING
// ===================================================
function computeScores(ratings) {
  function dimScore(dim) {
    const stmts = STMTS.filter(s => s.dim === dim);
    const vals  = stmts.map(s => {
      const r = ratings[s.id];
      if (!r) return null;
      return s.rev ? (7 - r) : r;
    }).filter(v => v !== null);
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  }
  return { care: dimScore('care'), challenge: dimScore('chal') };
}

function classify(care, challenge) {
  const MID    = 3.5;
  const hiCare = care      > MID;
  const hiChal = challenge > MID;
  if ( hiCare &&  hiChal) return 'CandidAndCaring';
  if ( hiCare && !hiChal) return 'CaringButCautious';
  if (!hiCare &&  hiChal) return 'DirectButDistant';
  return 'DetachedAndDiplomatic';
}

function rate(v) {
  RATINGS[STMTS[CURRENT_STMT].id] = v;
  if (CURRENT_STMT < STMTS.length - 1) { CURRENT_STMT++; surveyView(); }
  else { surveyView(); }
}

function prevStmt() {
  if (CURRENT_STMT > 0) { CURRENT_STMT--; surveyView(); }
}

function nextStmt() {
  if (!RATINGS[STMTS[CURRENT_STMT].id]) return;
  if (CURRENT_STMT < STMTS.length - 1) { CURRENT_STMT++; surveyView(); }
  else { computeAndShowProfile(); }
}

  const { care, challenge } = computeScores(RATINGS);

  profileView(care, challenge, style, false);
}

async function saveResponse() {
  const btn = document.getElementById('save-btn');
  if (btn) { btn.textContent = 'Saving…'; btn.disabled = true; }
  const { care, challenge, style } = COMPUTED_PROFILE;
  const { error } = await sb.from('rc_responses').insert({
    eng_id:      ACTIVE_ENG.id,
    participant: PARTICIPANT_NAME,
    care:        Math.round(care      * 100) / 100,
    challenge:   Math.round(challenge * 100) / 100,
    style
  });
  if (error) {
    alert('Could not save. Please try again.\n' + error.message);
    if (btn) { btn.textContent = 'Add my result to the team →'; btn.disabled = false; }
    return;
  }
  profileView(care, challenge, style, true);
}

// ===================================================
//  SCATTER SVG
// ===================================================
function buildScatterSVG(resps, careMean, chalMean) {
  const W = 320, H = 260;
  const pL = 42, pR = 16, pT = 18, pB = 32;
  const plotW = W - pL - pR;
  const plotH = H - pT - pB;

  const toX = care => pL + ((care - 1) / 5) * plotW;
  const toY = chal => pT + plotH - ((chal - 1) / 5) * plotH;
  const midX = toX(3.5);
  const midY = toY(3.5);

  const qCol = {
    CandidAndCaring: '#7c3aed', CaringButCautious: '#0891b2',
    DirectButDistant: '#dc2626', DetachedAndDiplomatic: '#78716c'
  };

  const dots = resps.map((r, i) => {
    const jx = ((i * 37 + 7) % 11) - 5;
    const jy = ((i * 53 + 13) % 11) - 5;
    return {
      x:   Math.min(W - pR - 6, Math.max(pL + 6, toX(r.care)      + jx)),
      y:   Math.min(H - pB - 6, Math.max(pT + 6, toY(r.challenge) + jy)),
      col: qCol[r.style] || '#6b7280'
    };
  });

  const svg = `
    <svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;width:100%">
      <rect x="${pL}" y="${pT}"  width="${midX-pL}"       height="${midY-pT}"       fill="#ecfeff" opacity="0.7"/>
      <rect x="${midX}" y="${pT}" width="${W-pR-midX}"     height="${midY-pT}"       fill="#f5f3ff" opacity="0.7"/>
      <rect x="${pL}" y="${midY}" width="${midX-pL}"       height="${H-pB-midY}"     fill="#fff1f2" opacity="0.5"/>
      <rect x="${midX}" y="${midY}" width="${W-pR-midX}"   height="${H-pB-midY}"     fill="#fafaf9" opacity="0.7"/>
      <rect x="${pL}" y="${pT}" width="${plotW}" height="${plotH}" fill="none" stroke="#e5e7eb" stroke-width="1"/>
      <line x1="${midX}" y1="${pT}" x2="${midX}" y2="${H-pB}" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>
      <line x1="${pL}" y1="${midY}" x2="${W-pR}" y2="${midY}" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="${pL+5}" y="${pT+13}" font-size="8" fill="#0891b2" font-weight="700" font-family="system-ui">Caring &amp; Cautious</text>
      <text x="${midX+5}" y="${pT+13}" font-size="8" fill="#7c3aed" font-weight="700" font-family="system-ui">Candid &amp; Caring</text>
      <text x="${pL+5}" y="${H-pB-7}" font-size="8" fill="#78716c" font-weight="700" font-family="system-ui">Detached</text>
      <text x="${midX+5}" y="${H-pB-7}" font-size="8" fill="#dc2626" font-weight="700" font-family="system-ui">Direct &amp; Distant</text>
      <text x="11" y="${pT+plotH/2}" font-size="8" fill="#9ca3af" text-anchor="middle" font-family="system-ui"
        transform="rotate(-90,11,${pT+plotH/2})">← Low  ·  Challenge  ·  High →</text>
      <text x="${pL+plotW/2}" y="${H-6}" font-size="8" fill="#9ca3af" text-anchor="middle" font-family="system-ui">← Low  ·  Care Personally  ·  High →</text>
      <circle cx="${toX(careMean).toFixed(1)}" cy="${toY(chalMean).toFixed(1)}" r="11"
        fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
      ${dots.map(d => `<circle cx="${d.x.toFixed(1)}" cy="${d.y.toFixed(1)}" r="5.5" fill="${d.col}" opacity="0.85" stroke="white" stroke-width="1.5"/>`).join('')}
    </svg>`;

  const legend = `
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:8px">
      ${Object.entries(qCol).map(([s,c]) => `
        <span style="display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:${c}">
          <svg width="10" height="10"><circle cx="5" cy="5" r="5" fill="${c}"/></svg>${QUADRANTS[s].label}
        </span>`).join('')}
    </div>`;

  return svg + legend;
}

// ===================================================
//  NARRATIVE GENERATORS
// ===================================================
function generateDynamics(counts, n, careMean, chalMean) {
  const lines = [];
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const [majStyle, majCount] = sorted[0];
  const majPct = Math.round((majCount/n)*100);
  const q = QUADRANTS[majStyle];

  if (majPct >= 60) {
    lines.push(`This team has a clear <strong>${q.label}</strong> lean — ${majCount} of ${n} people (${majPct}%) show this as their current tendency. That concentration will shape the feedback culture in visible ways.`);
  } else {
    lines.push(`This is a genuinely mixed team across feedback styles. ${sorted.filter(([,v])=>v>0).map(([s,c])=>`${c} ${QUADRANTS[s].label}`).join(', ')}. Mixed profiles can produce rich feedback cultures when the differences are named and worked with — or persistent friction when they're not.`);
  }

  if (counts.CandidAndCaring > 0 && majStyle === 'CandidAndCaring') {
    lines.push(`A Candid & Caring majority tends to create high-trust, high-growth environments. The risk is that the standard feels aspirational to some, and those who aren't yet there may feel exposed rather than supported.`);
  }
  if (counts.CaringButCautious > counts.DirectButDistant) {
    lines.push(`The team leans toward care over challenge. Relationships are likely warm and supportive — but honest performance conversations may be consistently underdelivered. Growth can stall not from lack of talent but from lack of honest feedback.`);
  }
  if (counts.DirectButDistant > counts.CaringButCautious) {
    lines.push(`The team leans toward challenge over care. Feedback is probably direct and specific — but the relational container may not be strong enough for it to consistently land as intended. High performers may feel productive but not truly seen.`);
  }
  if (counts.DetachedAndDiplomatic > 0) {
    lines.push(`The presence of Detached & Diplomatic members is worth attending to. This pattern often reflects something about the environment as much as the individual — it's worth exploring what's making full engagement feel costly for those people.`);
  }

  const teamStyle = classify(careMean, chalMean);
  const tq = QUADRANTS[teamStyle];
  lines.push(`The team's centre of gravity sits in the <strong>${tq.label}</strong> quadrant (care: ${careMean.toFixed(1)}, challenge: ${chalMean.toFixed(1)}). ${tq.teamNote}`);

  return lines;
}

function generateWatchOuts(counts, n) {
  const w = [];
  if (counts.CaringButCautious > 0) {
    w.push("Important feedback being softened to the point of uselessness — people leaving conversations unclear about what actually needs to change.");
  }
  if (counts.DirectButDistant > 0) {
    w.push("Honest feedback landing as attack rather than care — creating defensiveness rather than growth, particularly if the recipient doesn't feel known or valued by the giver.");
  }
  if (counts.DetachedAndDiplomatic > 0) {
    w.push("Team members operating in a kind of managed distance — engaged enough to avoid conflict, not engaged enough to contribute fully. The cost is quiet rather than dramatic.");
  }
  if (counts.CandidAndCaring > 1 && counts.DetachedAndDiplomatic > 0) {
    w.push("A gap between those who give high-quality feedback and those who receive it without reciprocating. The Candid & Caring members may carry a disproportionate share of the team's feedback labour.");
  }
  w.push("Feedback only flowing downward. In most teams, the most underused feedback direction is upward — and it's often the most valuable.");
  return w;
}

function generateTeamAgreements(counts, n) {
  const a = [];
  a.push("We give feedback as close to the moment as possible — not stored up for reviews, and not weaponised in group settings.");
  if (counts.CaringButCautious > 0) {
    a.push("We distinguish between kindness and honesty. Protecting someone from a difficult truth is not care — it's self-protection. We commit to saying the useful thing, not just the comfortable one.");
  }
  if (counts.DirectButDistant > 0) {
    a.push("We name the care before we name the challenge. 'I'm raising this because I want you to succeed' is not a nicety — it's what makes honest feedback land as feedback rather than criticism.");
  }
  a.push("We make space for feedback to go upward as well as downward. Leaders get feedback too — and model receiving it.");
  a.push("We separate the message from the delivery. If feedback didn't land well, we say so — and try again rather than giving up on the conversation.");
  return a;
}

function generateFacilitationQs(counts) {
  return [
    "What's a piece of feedback you've been sitting on? What's stopping you from giving it?",
    "When did you last receive feedback that genuinely changed how you work? What made it land?",
    "What does this team's feedback culture feel like — as the people on the receiving end would describe it?",
    "Where does the balance tip in this team — towards too much care at the expense of honesty, or too much challenge at the expense of relationship?",
    "What would make it safer to give upward feedback here — to your manager, or to someone more senior?",
    "Is there anything this team is collectively avoiding saying? What would it take to say it?"
  ];
}
